<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block and Inline Elements</title>
    <style>
        div{
            border: 2px solid black;
                height: 40px;
                width: 200px;
                padding: 50px;
                margin: 50px;
             
        }
        span{
            border: 2px solid red;
            height: 40px;
            width: 10px;
            padding: 20px;
            margin: 20px;
           
        }
        p{
            border: 2px solid blue;
            height: 40px;
            width: 10px;
            padding: 20px;
            margin: 20px;
            display:inline-block;
        }
        i{
            border: 5px solid green;
            height: 60px;
            width: 30px;
            padding: 60px;
            margin: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div>This is a block element.</div>

    <span>This is an inline element.</span>
    <p>This is a block element1.</p>
    <i>This is a block element2.</i>
</body>
</html>
