<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GRID2</title>
        <style>
          .grid-container {
    display: grid;
    grid-template-columns: repeat(5, 100px);
    grid-template-rows: repeat(5, 100px);
}

.grid-items {
    border: 1px solid black;
    font-size: 40px;
}

.one {
    background-color: aqua;
    grid-column: 1 / 3;
}

.two {
    background-color: aquamarine;
    grid-column: 3 / 6;
}

.three {
    background-color: blue;
    grid-column: 2 / 6;
}

.four {
    background-color: blueviolet;
    grid-area: 2 / 2 / 5 / 5;
}

.five {
    background-color: chocolate;
    grid-area: 5 / 1 / 6 / 3;
}

.six {
    background-color: cadetblue;
    grid-area: 4 / 4 / 6 / 6;
}
        </style>
    </head>
    <body>
        <div class ="grid-container">
            <div class="grid-items one">1</div>
            <div class="grid-items two">2</div>
            <div class="grid-items three">3</div>
            <div class="grid-items four">4</div>
            <div class="grid-items five">5</div> 
            <div class="grid-items six">6</div>

        </div>

    </body>
    </html>
